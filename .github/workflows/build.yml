name: Lint & Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js from .nvmrc file
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome:ci
      - run: pnpm eslint
      - run: pnpm build
